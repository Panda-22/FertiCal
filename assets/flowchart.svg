<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1580" font-family="'Avenir Next', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf7f1"/>
      <stop offset="100%" stop-color="#f4efe6"/>
    </linearGradient>
    <linearGradient id="inputGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffcf8"/>
      <stop offset="100%" stop-color="#fef9f3"/>
    </linearGradient>
    <linearGradient id="processGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eaf5f2"/>
      <stop offset="100%" stop-color="#d9ede8"/>
    </linearGradient>
    <linearGradient id="outputGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcf4ea"/>
      <stop offset="100%" stop-color="#f8ebd8"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#12736b"/>
    </marker>
    <marker id="arrow-dash" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#b0763a"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#241d18" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1580" fill="url(#bg)" rx="0"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-size="26" font-weight="700" fill="#172126">FertiCal — 功能流程图 / Functional Flowchart</text>
  <line x1="360" y1="65" x2="840" y2="65" stroke="#12736b" stroke-width="2" opacity="0.3"/>

  <!-- ============================== SECTION LABELS ============================== -->
  <text x="72" y="105" font-size="12" font-weight="600" fill="#12736b" text-transform="uppercase" letter-spacing="1">INPUT</text>
  <line x1="72" y1="110" x2="164" y2="110" stroke="#12736b" stroke-width="1.5" opacity="0.3"/>

  <text x="72" y="465" font-size="12" font-weight="600" fill="#12736b" text-transform="uppercase" letter-spacing="1">PROCESSING</text>
  <line x1="72" y1="470" x2="200" y2="470" stroke="#12736b" stroke-width="1.5" opacity="0.3"/>

  <text x="72" y="1060" font-size="12" font-weight="600" fill="#12736b" text-transform="uppercase" letter-spacing="1">OUTPUT</text>
  <line x1="72" y1="1065" x2="155" y2="1065" stroke="#12736b" stroke-width="1.5" opacity="0.3"/>

  <!-- ============================== INPUT LAYER ============================== -->

  <!-- Block 1: Water Report -->
  <rect x="72" y="128" width="500" height="280" rx="12" fill="url(#inputGrad)" stroke="#12736b" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="72" y="128" width="500" height="40" rx="12" fill="#12736b"/>
  <rect x="72" y="148" width="500" height="20" fill="#12736b"/>
  <text x="322" y="154" text-anchor="middle" font-size="15" font-weight="600" fill="#fff">① 导入水质检测报告</text>
  <text x="322" y="154" text-anchor="middle" font-size="15" font-weight="600" fill="#fff">① Import Water Quality Report</text>

  <text x="92" y="196" font-size="13" font-weight="600" fill="#172126">Supported formats:</text>
  <rect x="92" y="206" width="96" height="26" rx="4" fill="#12736b" opacity="0.12"/>
  <text x="140" y="224" text-anchor="middle" font-size="12" fill="#12736b" font-weight="600">.xlsx</text>
  <rect x="196" y="206" width="80" height="26" rx="4" fill="#12736b" opacity="0.12"/>
  <text x="236" y="224" text-anchor="middle" font-size="12" fill="#12736b" font-weight="600">.xls</text>
  <rect x="284" y="206" width="76" height="26" rx="4" fill="#12736b" opacity="0.12"/>
  <text x="322" y="224" text-anchor="middle" font-size="12" fill="#12736b" font-weight="600">.csv</text>

  <text x="92" y="264" font-size="11" fill="#5f6c71">Auto-detected elements (20 parameters):</text>
  <text x="92" y="282" font-size="11" fill="#172126">Ca · Mg · NO₃-N · NH₄-N · N · P · K · S · Cl</text>
  <text x="92" y="298" font-size="11" fill="#172126">Fe · Mn · Zn · B · Cu · Mo · Na · Si · HCO₃⁻</text>
  <text x="92" y="314" font-size="11" fill="#172126">EC · pH</text>

  <text x="92" y="342" font-size="11" fill="#5f6c71">Supports wide format (header row + value row)</text>
  <text x="92" y="358" font-size="11" fill="#5f6c71">and long format (key-value columns)</text>
  <text x="92" y="378" font-size="11" fill="#5f6c71">Smart NH₃ → NH₄-N unit conversion</text>

  <!-- Block 2: Tank A -->
  <rect x="628" y="128" width="500" height="134" rx="12" fill="url(#inputGrad)" stroke="#12736b" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="628" y="128" width="500" height="40" rx="12" fill="#1a8c82"/>
  <rect x="628" y="148" width="500" height="20" fill="#1a8c82"/>
  <text x="878" y="154" text-anchor="middle" font-size="15" font-weight="600" fill="#fff">② 配置 A 桶母液</text>
  <text x="878" y="154" text-anchor="middle" font-size="15" font-weight="600" fill="#fff">② Configure Tank A Stock Solution</text>

  <text x="648" y="194" font-size="11" fill="#172126">• Select fertilizer type (8 pre-configured A-compatible fertilizers)</text>
  <text x="648" y="212" font-size="11" fill="#172126">• Set amount: kg or g</text>
  <text x="648" y="230" font-size="11" fill="#172126">• Stock solution volume (L)</text>
  <text x="648" y="248" font-size="11" fill="#172126">• Dilution factor (x)</text>

  <!-- Block 3: Tank B -->
  <rect x="628" y="274" width="500" height="134" rx="12" fill="url(#inputGrad)" stroke="#12736b" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="628" y="274" width="500" height="40" rx="12" fill="#b0763a"/>
  <rect x="628" y="294" width="500" height="20" fill="#b0763a"/>
  <text x="878" y="300" text-anchor="middle" font-size="15" font-weight="600" fill="#fff">③ 配置 B 桶母液</text>
  <text x="878" y="300" text-anchor="middle" font-size="15" font-weight="600" fill="#fff">③ Configure Tank B Stock Solution</text>

  <text x="648" y="340" font-size="11" fill="#172126">• Select fertilizer type (9 pre-configured B-compatible fertilizers)</text>
  <text x="648" y="358" font-size="11" fill="#172126">• Set amount: kg or g</text>
  <text x="648" y="376" font-size="11" fill="#172126">• Stock solution volume (L)</text>
  <text x="648" y="394" font-size="11" fill="#172126">• Dilution factor (x)</text>

  <!-- Fertilizer Catalog note -->
  <rect x="628" y="420" width="500" height="40" rx="8" fill="#241d18" opacity="0.04" stroke="#241d18" stroke-width="0.5" stroke-dasharray="4,3"/>
  <text x="878" y="445" text-anchor="middle" font-size="11" fill="#5f6c71">Built-in catalog: 17 fertilizers, each with elemental % composition</text>

  <!-- Arrows from Input to Processing -->
  <line x1="322" y1="408" x2="322" y2="498" stroke="#12736b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="878" y1="458" x2="878" y2="498" stroke="#12736b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============================== PROCESSING LAYER ============================== -->

  <!-- Calculation Engine -->
  <rect x="72" y="498" width="1056" height="160" rx="12" fill="url(#processGrad)" stroke="#12736b" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="72" y="498" width="1056" height="40" rx="12" fill="#12736b"/>
  <rect x="72" y="518" width="1056" height="20" fill="#12736b"/>
  <text x="600" y="524" text-anchor="middle" font-size="15" font-weight="600" fill="#fff">④ 计算引擎 Calculation Engine</text>

  <!-- Step 1: Element Totals -->
  <rect x="92" y="552" width="320" height="88" rx="8" fill="rgba(255,255,255,0.7)" stroke="#12736b" stroke-width="1" stroke-opacity="0.3"/>
  <text x="252" y="572" text-anchor="middle" font-size="12" font-weight="600" fill="#12736b">元素质量计算</text>
  <text x="252" y="572" text-anchor="middle" font-size="12" font-weight="600" fill="#12736b">Element Mass Calculation</text>
  <text x="107" y="592" font-size="10.5" fill="#5f6c71">mass = amount × (element% / 100)</text>
  <text x="107" y="610" font-size="10.5" fill="#5f6c71">Sum across all fertilizers per tank</text>
  <text x="107" y="628" font-size="10.5" fill="#172126" font-weight="600">Output: total grams per element</text>

  <!-- Arrow -->
  <line x1="412" y1="596" x2="462" y2="596" stroke="#12736b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2 --><!-- Step 2: Stock → Irrigation -->
  <rect x="464" y="552" width="304" height="88" rx="8" fill="rgba(255,255,255,0.7)" stroke="#12736b" stroke-width="1" stroke-opacity="0.3"/>
  <text x="616" y="572" text-anchor="middle" font-size="12" font-weight="600" fill="#12736b">浓度换算</text>
  <text x="616" y="572" text-anchor="middle" font-size="12" font-weight="600" fill="#12736b">Concentration Conversion</text>
  <text x="479" y="592" font-size="10.5" fill="#5f6c71">Stock conc. = mass × 1000 / volume (mg/L)</text>
  <text x="479" y="610" font-size="10.5" fill="#5f6c71">Irrigation conc. = stock conc. / dilution</text>
  <text x="479" y="628" font-size="10.5" fill="#5f6c71">Convert to mmol/L via molar mass</text>

  <!-- Arrow -->
  <line x1="768" y1="596" x2="818" y2="596" stroke="#12736b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Final + Precipitation -->
  <rect x="820" y="552" width="290" height="88" rx="8" fill="rgba(255,255,255,0.7)" stroke="#b0763a" stroke-width="1" stroke-opacity="0.4"/>
  <text x="965" y="572" text-anchor="middle" font-size="12" font-weight="600" fill="#b0763a">叠加与评估</text>
  <text x="965" y="572" text-anchor="middle" font-size="12" font-weight="600" fill="#b0763a">Superposition & Assessment</text>
  <text x="835" y="592" font-size="10.5" fill="#5f6c71">Final = water bg + A irrigation + B irrigation</text>
  <text x="835" y="610" font-size="10.5" fill="#5f6c71">Deviation = (final − target) / target</text>
  <text x="835" y="628" font-size="10.5" fill="#5f6c71">Precipitation: ion product vs Ksp</text>

  <!-- Vertical arrow down to OUTPUT -->
  <line x1="600" y1="658" x2="600" y2="740" stroke="#12736b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============================== OUTPUT LAYER ============================== -->

  <!-- Result set 1: Element Totals -->
  <rect x="72" y="740" width="508" height="120" rx="12" fill="url(#outputGrad)" stroke="#b0763a" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="72" y="740" width="508" height="36" rx="12" fill="#b0763a"/>
  <rect x="72" y="756" width="508" height="20" fill="#b0763a"/>
  <text x="326" y="764" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">A/B 配方元素总量</text>
  <text x="326" y="764" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">A/B Element Totals</text>

  <text x="92" y="800" font-size="11" fill="#172126">Table: Element | A Total (g) | B Total (g) | Combined (g)</text>
  <text x="92" y="820" font-size="11" fill="#5f6c71">Shows all elements present in either tank</text>
  <text x="92" y="840" font-size="11" fill="#5f6c71">Always displays NPKCaMgS; others shown when present</text>

  <!-- Result set 2: Target Values -->
  <rect x="620" y="740" width="508" height="120" rx="12" fill="url(#outputGrad)" stroke="#b0763a" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="620" y="740" width="508" height="36" rx="12" fill="#b0763a"/>
  <rect x="620" y="756" width="508" height="20" fill="#b0763a"/>
  <text x="874" y="764" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">元素目标值</text>
  <text x="874" y="764" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">Target Values (editable)</text>

  <text x="640" y="800" font-size="11" fill="#172126">Table: Element | Unit | Target Value</text>
  <text x="640" y="820" font-size="11" fill="#5f6c71">User can set target concentrations for each element</text>
  <text x="640" y="840" font-size="11" fill="#5f6c71">Used for deviation calculation in results</text>

  <!-- Result set 3: Irrigation Concentration (Main) -->
  <rect x="72" y="876" width="1056" height="170" rx="12" fill="url(#outputGrad)" stroke="#b0763a" stroke-width="2" filter="url(#shadow)"/>
  <rect x="72" y="876" width="1056" height="36" rx="12" fill="#d88946"/>
  <rect x="72" y="892" width="1056" height="20" fill="#d88946"/>
  <text x="600" y="900" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">⑤ 理论灌溉液浓度 + 偏差分析</text>
  <text x="600" y="900" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">⑤ Theoretical Irrigation Concentration + Deviation Analysis</text>

  <text x="92" y="936" font-size="11" fill="#172126" font-weight="600">Table columns:</text>
  <text x="92" y="956" font-size="11" fill="#172126">Element | Unit | Background Water | A Contribution | B Contribution</text>
  <text x="92" y="976" font-size="11" fill="#172126">| Theoretical Value | Target | Deviation %</text>

  <text x="92" y="1004" font-size="11" fill="#b23a2b" font-weight="600">⚠ Deviation highlight:</text>
  <text x="262" y="1004" font-size="11" fill="#5f6c71">When |deviation| &gt; 15%, the theoretical value and deviation</text>
  <text x="262" y="1020" font-size="11" fill="#5f6c71">are displayed in red for immediate attention.</text>

  <!-- Result set 4: Precipitation Risk -->
  <rect x="72" y="1062" width="1056" height="140" rx="12" fill="url(#outputGrad)" stroke="#b0763a" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="72" y="1062" width="1056" height="36" rx="12" fill="#b0763a"/>
  <rect x="72" y="1078" width="1056" height="20" fill="#b0763a"/>
  <text x="600" y="1086" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">A / B 桶析出风险</text>
  <text x="600" y="1086" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">Precipitation Risk Assessment</text>

  <text x="92" y="1126" font-size="11" fill="#172126" font-weight="600">CaSO₄ precipitation:</text>
  <text x="240" y="1126" font-size="11" fill="#5f6c71">Ion product = [Ca²⁺] × [SO₄²⁻] vs Ksp = 2.4×10⁻⁵</text>

  <text x="92" y="1148" font-size="11" fill="#172126" font-weight="600">Ca₃(PO₄)₂ precipitation:</text>
  <text x="240" y="1148" font-size="11" fill="#5f6c71">Ion product = [Ca²⁺]³ × [PO₄³⁻]² vs Ksp = 2.07×10⁻³³</text>

  <text x="92" y="1176" font-size="11" fill="#5f6c71">Includes both stock solution AND background water Ca/S/P contributions</text>
  <text x="92" y="1192" font-size="11" fill="#5f6c71">If ion product &gt; Ksp, precipitation may occur in the stock tank</text>

  <!-- ============================== LEGEND ============================== -->
  <rect x="72" y="1230" width="1056" height="70" rx="8" fill="rgba(255,255,255,0.5)" stroke="#241d18" stroke-width="0.5" stroke-dasharray="4,3"/>
  <text x="92" y="1256" font-size="11" font-weight="600" fill="#172126">图例 / Legend:</text>

  <rect x="92" y="1266" width="14" height="14" rx="3" fill="#12736b"/>
  <text x="112" y="1278" font-size="10" fill="#5f6c71">Input / Processing</text>

  <rect x="260" y="1266" width="14" height="14" rx="3" fill="#b0763a"/>
  <text x="280" y="1278" font-size="10" fill="#5f6c71">Output / Results</text>

  <rect x="410" y="1266" width="14" height="14" rx="3" fill="#d88946"/>
  <text x="430" y="1278" font-size="10" fill="#5f6c71">Main result screen</text>

  <line x1="570" y1="1273" x2="620" y2="1273" stroke="#12736b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="628" y="1278" font-size="10" fill="#5f6c71">Data flow</text>

  <line x1="760" y1="1273" x2="810" y2="1273" stroke="#b0763a" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-dash)"/>
  <text x="818" y="1278" font-size="10" fill="#5f6c71">Optional / configurable</text>

  <!-- ============================== USER ACTION PATH ============================== -->
  <text x="72" y="1340" font-size="12" font-weight="600" fill="#12736b" text-transform="uppercase" letter-spacing="1">USER WORKFLOW / 操作流程</text>
  <line x1="72" y1="1345" x2="270" y2="1345" stroke="#12736b" stroke-width="1.5" opacity="0.3"/>

  <!-- Step indicators -->
  <circle cx="108" cy="1380" r="18" fill="#12736b"/>
  <text x="108" y="1386" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">1</text>
  <text x="136" y="1386" font-size="12" fill="#172126">Upload water report</text>

  <circle cx="328" cy="1380" r="18" fill="#1a8c82"/>
  <text x="328" y="1386" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">2</text>
  <text x="356" y="1386" font-size="12" fill="#172126">Configure Tank A</text>

  <circle cx="548" cy="1380" r="18" fill="#b0763a"/>
  <text x="548" y="1386" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">3</text>
  <text x="576" y="1386" font-size="12" fill="#172126">Configure Tank B</text>

  <circle cx="768" cy="1380" r="18" fill="#12736b"/>
  <text x="768" y="1386" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">4</text>
  <text x="796" y="1386" font-size="12" fill="#172126">Set target values</text>

  <circle cx="988" cy="1380" r="18" fill="#d88946"/>
  <text x="988" y="1386" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">5</text>
  <text x="1016" y="1386" font-size="12" fill="#172126">Review results</text>

  <!-- Connector arrows between steps -->
  <line x1="222" y1="1380" x2="298" y2="1380" stroke="#12736b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="442" y1="1380" x2="518" y2="1380" stroke="#12736b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="662" y1="1380" x2="738" y2="1380" stroke="#12736b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="882" y1="1380" x2="958" y2="1380" stroke="#12736b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Footer -->
  <text x="600" y="1440" text-anchor="middle" font-size="10" fill="#5f6c71">FertiCal v1.0 · Built with vanilla JS · No backend required</text>

  <!-- Data flow dotted arrows for optional target input -->
  <line x1="326" y1="860" x2="600" y2="960" stroke="#b0763a" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-dash)"/>
  <text x="370" y="915" font-size="9" fill="#b0763a" transform="rotate(-45, 370, 915)">target values</text>

</svg>
